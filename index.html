<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mercator Game</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --highlight-color: #f472b6;
            --map-sea: #1e293b;
            --map-land: #334155;
            --map-stroke: #475569;
            --overlay-bg: rgba(15, 23, 42, 0.85);
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
        }

        header {
            position: absolute;
            top: 20px;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            /* Let clicks pass through */
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: linear-gradient(to right, var(--accent-color), var(--highlight-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            display: block;
        }

        .water {
            fill: var(--map-sea);
        }

        .land {
            fill: var(--map-land);
            stroke: var(--map-stroke);
            stroke-width: 0.5px;
            transition: fill 0.3s ease;
        }

        .land:hover {
            fill: #475569;
        }

        .graticule {
            fill: none;
            stroke: #ffffff;
            stroke-opacity: 0.05;
            stroke-width: 0.5px;
        }

        #ui-layer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: var(--overlay-bg);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #instruction {
            font-size: 1.25rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .city-name {
            color: var(--accent-color);
            font-weight: 800;
        }

        #feedback {
            font-size: 1.1rem;
            color: var(--highlight-color);
            min-height: 1.5em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, var(--accent-color), #0284c7);
            border: none;
            padding: 12px 24px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: var(--accent-color);
            z-index: 50;
        }
    </style>
</head>

<body>

    <header>
        <h1>The Mercator Game</h1>
    </header>

    <div id="game-container">
        <div id="loading">Generating World...</div>
        <svg id="map"></svg>

        <div id="ui-layer">
            <div id="instruction">Initializing...</div>
            <div id="feedback"></div>
            <button id="next-btn" onclick="nextRound()" style="display:none;">Next City</button>
        </div>
    </div>

    <script>
        const cities = [
            { name: "London", lat: 51.5074, lon: -0.1278 },
            { name: "Tokyo", lat: 35.6762, lon: 139.6503 },
            { name: "New York", lat: 40.7128, lon: -74.0060 },
            { name: "Paris", lat: 48.8566, lon: 2.3522 },
            { name: "Sydney", lat: -33.8688, lon: 151.2093 },
            { name: "Rio de Janeiro", lat: -22.9068, lon: -43.1729 },
            { name: "Cairo", lat: 30.0444, lon: 31.2357 },
            { name: "Moscow", lat: 55.7558, lon: 37.6173 },
            { name: "Beijing", lat: 39.9042, lon: 116.4074 },
            { name: "Mumbai", lat: 19.0760, lon: 72.8777 },
            { name: "Cape Town", lat: -33.9249, lon: 18.4241 },
            { name: "Buenos Aires", lat: -34.6037, lon: -58.3816 },
            { name: "Los Angeles", lat: 34.0522, lon: -118.2437 },
            { name: "Singapore", lat: 1.3521, lon: 103.8198 },
            { name: "Istanbul", lat: 41.0082, lon: 28.9784 },
            { name: "Mexico City", lat: 19.4326, lon: -99.1332 },
            { name: "Bangkok", lat: 13.7563, lon: 100.5018 },
            { name: "Dubai", lat: 25.2048, lon: 55.2708 },
            { name: "Toronto", lat: 43.6532, lon: -79.3832 },
            { name: "Seoul", lat: 37.5665, lon: 126.9780 },
            { name: "Berlin", lat: 52.5200, lon: 13.4050 },
            { name: "Madrid", lat: 40.4168, lon: -3.7038 },
            { name: "Rome", lat: 41.9028, lon: 12.4964 },
            { name: "Jakarta", lat: -6.2088, lon: 106.8456 },
            { name: "Sao Paulo", lat: -23.5505, lon: -46.6333 },
            { name: "Lagos", lat: 6.5244, lon: 3.3792 },
            { name: "Lima", lat: -12.0464, lon: -77.0428 },
            { name: "Bogota", lat: 4.7110, lon: -74.0721 },
            { name: "Shanghai", lat: 31.2304, lon: 121.4737 },
            { name: "Karachi", lat: 24.8607, lon: 67.0011 },
            { name: "Dhaka", lat: 23.8103, lon: 90.4125 },
            { name: "Delhi", lat: 28.6139, lon: 77.2090 },
            { name: "Manila", lat: 14.5995, lon: 120.9842 },
            { name: "Tianjin", lat: 39.3434, lon: 117.3616 },
            { name: "Kinshasa", lat: -4.4419, lon: 15.2663 },
            { name: "Guangzhou", lat: 23.1291, lon: 113.2644 },
            { name: "Lahore", lat: 31.5204, lon: 74.3587 },
            { name: "Shenzhen", lat: 22.5431, lon: 114.0579 },
            { name: "Bangalore", lat: 12.9716, lon: 77.5946 },
            { name: "Ho Chi Minh City", lat: 10.8231, lon: 106.6297 },
            { name: "Chennai", lat: 13.0827, lon: 80.2707 },
            { name: "Chengdu", lat: 30.5728, lon: 104.0668 },
            { name: "Tehran", lat: 35.6892, lon: 51.3890 },
            { name: "Wuhan", lat: 30.5928, lon: 114.3055 },
            { name: "Hyderabad", lat: 17.3850, lon: 78.4867 },
            { name: "Hong Kong", lat: 22.3193, lon: 114.1694 },
            { name: "Chongqing", lat: 29.4316, lon: 106.9123 },
            { name: "Hangzhou", lat: 30.2741, lon: 120.1551 },
            { name: "Baghdad", lat: 33.3128, lon: 44.3661 },
            { name: "Riyadh", lat: 24.7136, lon: 46.6753 },
            { name: "Santiago", lat: -33.4489, lon: -70.6693 },
            { name: "Melbourne", lat: -37.8136, lon: 144.9631 },
            { name: "Johannesburg", lat: -26.2041, lon: 28.0473 },
            { name: "Casablanca", lat: 33.5731, lon: -7.5898 },
            { name: "Nairobi", lat: -1.2921, lon: 36.8219 },
            { name: "Addis Ababa", lat: 9.0320, lon: 38.7445 },
            { name: "Vancouver", lat: 49.2827, lon: -123.1207 },
            { name: "Chicago", lat: 41.8781, lon: -87.6298 },
            { name: "San Francisco", lat: 37.7749, lon: -122.4194 },
            { name: "Miami", lat: 25.7617, lon: -80.1918 },
            { name: "Honolulu", lat: 21.3069, lon: -157.8583 },
            { name: "Anchorage", lat: 61.2181, lon: -149.9003 },
            { name: "Reykjavik", lat: 64.1466, lon: -21.9426 },
            { name: "Oslo", lat: 59.9139, lon: 10.7522 },
            { name: "Stockholm", lat: 59.3293, lon: 18.0686 },
            { name: "Helsinki", lat: 60.1695, lon: 24.9354 },
            { name: "Copenhagen", lat: 55.6761, lon: 12.5683 },
            { name: "Athens", lat: 37.9838, lon: 23.7275 },
            { name: "Lisbon", lat: 38.7223, lon: -9.1393 },
            { name: "Dublin", lat: 53.3498, lon: -6.2603 },
            { name: "Taipei", lat: 25.0330, lon: 121.5654 },
            { name: "Auckland", lat: -36.8485, lon: 174.7633 },
            { name: "Perth", lat: -31.9505, lon: 115.8605 }
        ];

        let projectionCity = null;
        let goalCity = null;
        let worldData = null;
        const width = window.innerWidth;
        const height = window.innerHeight;

        // Setup SVG
        const svg = d3.select("#map")
            .attr("width", width)
            .attr("height", height);

        // Define Projection
        let projection = d3.geoMercator()
            .translate([width / 2, height / 2])
            .scale(width / 6)
            .precision(0.1);

        const path = d3.geoPath().projection(projection);
        const graticule = d3.geoGraticule();

        async function init() {
            try {
                // Fetch World Data
                const response = await fetch("https://unpkg.com/world-atlas@2.0.2/countries-110m.json");
                const topology = await response.json();
                worldData = topojson.feature(topology, topology.objects.countries);

                document.getElementById('loading').style.display = 'none';

                // Draw layers
                svg.append("path")
                    .datum(graticule)
                    .attr("class", "graticule")
                    .attr("d", path);

                svg.selectAll(".land")
                    .data(worldData.features)
                    .enter().append("path")
                    .attr("class", "land")
                    .attr("d", path);

                // Click Interactive Layer
                svg.append("rect")
                    .attr("class", "overlay")
                    .attr("width", width)
                    .attr("height", height)
                    .style("fill", "transparent")
                    .on("click", handleMapClick);

                nextRound();

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "Error loading map data.";
            }
        }

        function nextRound() {
            // 1. Pick Projection City (Singularity)
            projectionCity = cities[Math.floor(Math.random() * cities.length)];

            // 2. Pick Goal City (Distinct from Projection City)
            do {
                goalCity = cities[Math.floor(Math.random() * cities.length)];
            } while (goalCity.name === projectionCity.name);

            // 3. Random Orientation: "Meridian" or "Parallel"
            // Meridian: Projection meridians are vertical (Standard Mercator logic relative to rotated pole).
            // Parallel: Projection meridians are horizontal (90 deg roll).
            const isMeridianVertical = Math.random() > 0.5;

            // Console Logging
            console.log(`Projection City (Singularity): ${projectionCity.name}`);
            console.log(`Orientation: ${isMeridianVertical ? 'Meridian Vertical' : 'Parallel Vertical'}`);
            console.log(`Goal City: ${goalCity.name}`);

            // Rotation Math
            // To make projectionCity the "North Pole" (singularity at top):
            // We rotate such that projectionCity (lon, lat) -> (0, 90).

            // User feedback indicates yaw = 90 - lon is correct for Meridian Vertical (Top Singularity).
            // "Parallel Vertical" interprets as 90-degree spin around the city.

            const yaw = isMeridianVertical ? - projectionCity.lon : 90 - projectionCity.lon;
            const pitch = isMeridianVertical ? 90 - projectionCity.lat : 0;

            // Roll:
            // If Meridian Vertical (Standard): roll = 0.
            // If Parallel Vertical: roll = 90 (Spin 90 degrees around the singularity).
            const roll = isMeridianVertical ? 0 : 90 - projectionCity.lat;

            const finalRotation = [yaw, pitch, roll];

            // Animate transition
            d3.transition()
                .duration(1500)
                .tween("rotate", () => {
                    const r = d3.interpolate(projection.rotate(), finalRotation);
                    return (t) => {
                        projection.rotate(r(t));
                        redraw();
                    };
                });

            // Update UI
            // Explicitly clearing previous points
            svg.selectAll(".click-point").remove();
            svg.selectAll(".goal-point").remove(); // Remove old goal points
            svg.selectAll(".goal-label").remove();

            document.getElementById('instruction').innerHTML = `<span class="city-name">${projectionCity.name}</span> is the North Pole on the map. Click on <span class="city-name">${goalCity.name}</span>.`;
            document.getElementById('feedback').innerText = "";
            document.getElementById('next-btn').style.display = "none";
        }

        function redraw() {
            svg.selectAll("path").attr("d", path);
        }

        function handleMapClick(event) {
            if (!goalCity || !projectionCity) return;

            const [x, y] = d3.pointer(event);
            const invert = projection.invert([x, y]);

            if (!invert) return;

            const [clickedLon, clickedLat] = invert;

            // Calculate Distance to GOAL CITY
            // d3.geoDistance returns radians
            const distanceRadians = d3.geoDistance(
                [clickedLon, clickedLat],
                [goalCity.lon, goalCity.lat]
            );

            // Radius percent
            // distanceRadians is distance on unit sphere.
            // The Earth's 'radius' isn't really the metric here, it's % of semi-circumference (PI) or radius (1 radian)?
            // "you are _% of the earth radius away".
            // 1 Radian = 1 Earth Radius distance on surface (~6371km).
            const percentRadius = (distanceRadians * 100).toFixed(1);

            // Distance in km
            const km = Math.round(distanceRadians * 6371);

            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `You are <strong>${percentRadius}%</strong> of the earth radius away (${km} km).`;

            // Visual feedback - Click Point
            svg.append("circle")
                .attr("class", "click-point")
                .attr("cx", x)
                .attr("cy", y)
                .attr("r", 5)
                .attr("fill", "var(--highlight-color)")
                .attr("stroke", "white")
                .attr("stroke-width", 2)
                .transition().duration(1000).attr("r", 20).attr("opacity", 0).remove();

            // Click Point Persistent
            svg.append("circle")
                .attr("class", "click-point")
                .attr("cx", x)
                .attr("cy", y)
                .attr("r", 4)
                .attr("fill", "var(--highlight-color)")
                .attr("stroke", "white");

            // --- SHOW ACTUAL GOAL ---
            const goalProjected = projection([goalCity.lon, goalCity.lat]);
            if (goalProjected) {
                const [gx, gy] = goalProjected;

                // Draw Goal Point
                svg.append("circle")
                    .attr("class", "goal-point")
                    .attr("cx", gx)
                    .attr("cy", gy)
                    .attr("r", 0)
                    .attr("fill", "#22c55e") // Green success color
                    .attr("stroke", "white")
                    .attr("stroke-width", 2)
                    .transition().duration(750)
                    .attr("r", 6);

                // Optional: Label
                svg.append("text")
                    .attr("class", "goal-label")
                    .attr("x", gx)
                    .attr("y", gy - 10)
                    .attr("text-anchor", "middle")
                    .style("fill", "#22c55e")
                    .style("font-weight", "bold")
                    .style("font-size", "12px")
                    .style("text-shadow", "0 2px 4px rgba(0,0,0,0.8)")
                    .text(goalCity.name)
                    .style("opacity", 0)
                    .transition().delay(200).duration(500)
                    .style("opacity", 1);
            }

            document.getElementById('next-btn').style.display = "inline-block";
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            svg.attr("width", w).attr("height", h);
            projection.translate([w / 2, h / 2]).scale(w / 6);
            redraw();
        });

        init();
    </script>
</body>

</html>
